<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 复习间隙小游戏合集</title>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --text: #e8e8f0;
    --text-dim: #9999bb;
    --primary: #6c63ff;
    --primary-glow: #8b83ff;
    --pink: #ff6b9d;
    --cyan: #00d4ff;
    --warning: #ffd93d;
    --success: #4ecca3;
    --radius: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
    padding: 20px;
  }
  .container { max-width: 720px; width: 100%; }

  .header { text-align: center; margin-bottom: 36px; }
  .header .icon { font-size: 64px; margin-bottom: 12px; }
  .header h1 {
    font-size: 32px; font-weight: 800;
    background: linear-gradient(135deg, var(--pink), var(--warning), var(--cyan), var(--primary-glow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 8px;
  }
  .header p { color: var(--text-dim); font-size: 15px; }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid rgba(255,255,255,0.05);
    border-radius: var(--radius); padding: 28px 20px; text-align: center;
    text-decoration: none; color: var(--text); transition: 0.25s ease;
    display: block; position: relative; overflow: hidden;
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .card.brain:hover { border-color: rgba(108,99,255,0.4); }
  .card.art:hover { border-color: rgba(255,107,157,0.4); }
  .card.zen:hover { border-color: rgba(0,212,255,0.4); }
  .card .c-icon { font-size: 52px; margin-bottom: 12px; display: block; }
  .card .c-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .card .c-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .card .c-badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; margin-top: 12px;
  }
  .badge-purple { background: rgba(108,99,255,0.15); color: var(--primary-glow); }
  .badge-pink { background: rgba(255,107,157,0.15); color: var(--pink); }
  .badge-cyan { background: rgba(0,212,255,0.15); color: var(--cyan); }

  .footer {
    text-align: center; margin-top: 36px; padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .footer a { color: var(--text-dim); font-size: 13px; text-decoration: none; transition: 0.2s; }
  .footer a:hover { color: var(--text); }
  .footer .sep { color: rgba(255,255,255,0.1); margin: 0 10px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">🎯</div>
    <h1>复习间隙小游戏合集</h1>
    <p>考试复习累了？来玩 5 分钟，给大脑换个节奏</p>
  </div>

  <div class="cards">
    <a href="脑力激活小游戏.html" class="card brain">
      <span class="c-icon">🧠</span>
      <div class="c-title">脑力激活</div>
      <div class="c-desc">记忆翻牌 · 心算挑战<br>色词冲突 · 反应点击</div>
      <span class="c-badge badge-purple">4 个游戏</span>
    </a>

    <a href="创意画室.html" class="card art">
      <span class="c-icon">🎨</span>
      <div class="c-title">创意画室</div>
      <div class="c-desc">涂鸦 · 万花筒 · 像素画<br>曼陀罗 · 连点 · 喷漆</div>
      <span class="c-badge badge-pink">6 个项目</span>
    </a>

    <a href="解压实验室.html" class="card zen">
      <span class="c-icon">🧸</span>
      <div class="c-title">解压实验室</div>
      <div class="c-desc">泡泡纸 · 粒子烟花<br>彩虹流体 · 迷你钢琴</div>
      <span class="c-badge badge-cyan">4 个玩具</span>
    </a>
  </div>

  <div class="footer">
    <a href="https://github.com/Cecilia11-cc/study-break-fun">📦 GitHub</a>
    <span class="sep">|</span>
    <a href="LICENSE">📄 MIT License</a>
    <span class="sep">|</span>
    <span style="font-size:13px;color:var(--text-dim)">by Cecilia</span>
  </div>
</div>
</body>
</html>
